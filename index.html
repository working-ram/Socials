<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Ram</title>
</head>
  <style>
    :root{--bg1:#0b0b0d;--bg2:#121214;--core-1:rgba(255,255,255,0.85);--core-2:rgba(220,220,226,0.55);--accent:rgba(200,200,205,0.25)}
    html,body{height:100%;margin:0;background:linear-gradient(180deg,var(--bg1),var(--bg2));color:#e9eef2}
    .toplink{position:fixed;left:16px;top:12px;font-family:system-ui,Arial,sans-serif;z-index:30}
    .toplink a{color:#d9dde2;text-decoration:none;font-size:14px}
    .toplink img{height:36px;vertical-align:middle;margin-right:8px;border-radius:6px}
    .stage{position:fixed;inset:0;overflow:hidden}
    /* core styled to feel like protons: soft bright center with small orbiting particles */
    .core{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:260px;height:260px;border-radius:50%;
      background:radial-gradient(circle at 50% 50%, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.08) 10%, rgba(230,230,235,0.04) 40%, transparent 70%),
                 radial-gradient(circle at 35% 30%, var(--core-2) 0%, rgba(220,220,226,0.02) 40%, transparent 75%);
      box-shadow:0 0 90px rgba(255,255,255,0.03),0 0 24px rgba(200,200,205,0.02) inset;z-index:5;animation:corePulse 5s ease-in-out infinite}
    .protons{position:absolute;inset:0;border-radius:50%;pointer-events:none}
    .proton-wrap{position:absolute;left:50%;top:50%;transform-origin:center;}
    .proton{position:absolute;left:50%;top:50%;width:10px;height:10px;margin:-5px 0 0 -5px;background:radial-gradient(circle, rgba(255,255,255,0.95) 0%, rgba(245,245,247,0.7) 40%, rgba(220,220,225,0.2) 100%);border-radius:50%;box-shadow:0 0 10px rgba(255,255,255,0.9),0 0 18px rgba(220,220,226,0.12)}
    .proton.p2{width:8px;height:8px;margin:-4px 0 0 -4px;background:radial-gradient(circle, rgba(240,240,242,0.95) 0%, rgba(230,230,235,0.6) 40%)}
    .proton.p3{width:6px;height:6px;margin:-3px 0 0 -3px;background:radial-gradient(circle, rgba(235,235,238,0.95) 0%, rgba(225,225,230,0.6) 40%)}
    .orbit1{width:220px;height:220px;margin-left:-110px;margin-top:-110px;animation:spin 14s linear infinite}
    .orbit2{width:160px;height:160px;margin-left:-80px;margin-top:-80px;animation:spin 9s linear reverse infinite}
    .orbit3{width:100px;height:100px;margin-left:-50px;margin-top:-50px;animation:spin 6s linear infinite}
    .ring{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;box-shadow:0 0 20px rgba(255,255,255,0.02) inset;pointer-events:none}
    .ring.r1{width:420px;height:420px;border:1px solid rgba(255,255,255,0.02)}
    .ring.r2{width:340px;height:340px;border:1px solid rgba(255,255,255,0.01)}
    .center{position:relative;z-index:10;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:system-ui,Arial,sans-serif;font-size:56px}
    .name{background:linear-gradient(90deg,#f6f7f8,#dfe6ea);-webkit-background-clip:text;background-clip:text;color:transparent;filter:brightness(0.98)}
    @keyframes corePulse{0%{transform:translate(-50%,-50%) scale(0.99)}50%{transform:translate(-50%,-50%) scale(1.02)}100%{transform:translate(-50%,-50%) scale(0.99)}}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    /* subtle gray nebula */
    .nebula{position:fixed;inset:-20% -10% -20% -10%;background:radial-gradient(600px 300px at 20% 30%, rgba(200,200,205,0.04), transparent 10%),radial-gradient(500px 250px at 80% 70%, rgba(220,220,225,0.03), transparent 8%);mix-blend-mode:screen;pointer-events:none;animation:drift 14s ease-in-out infinite}
    @keyframes drift{0%{transform:translateY(0)}50%{transform:translateY(-10px)}100%{transform:translateY(0)}}
    @media (max-width:520px){.core{width:180px;height:180px}.center{font-size:32px}}
    /* 3D card styles */
    .card{position:fixed;left:32px;top:50%;transform:translateY(-50%);width:280px;height:380px;border-radius:20px;box-shadow:0 40px 90px rgba(0,0,0,0.28);overflow:visible;z-index:70;perspective:1700px}
    .card-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transform-origin:center center;transition:transform .08s ease-out;will-change:transform}
    .card-back{position:absolute;inset:12px;border-radius:20px;background:radial-gradient(circle at 50% 24%, rgba(255,255,255,0.96), rgba(241,242,246,0.92) 24%, rgba(225,226,231,0.78) 60%, rgba(210,211,216,0.55) 100%);box-shadow:0 10px 32px rgba(14,18,33,0.08) inset;transform:translateZ(6px);overflow:hidden}
    .card-back::before,.card-back::after{content:"";position:absolute;inset:0;pointer-events:none;mix-blend-mode:normal;opacity:0.12}
    .card-back::before{background:repeating-linear-gradient(90deg, rgba(2,32,90,0.14) 0 2px, transparent 2px 10px);animation:glitchShiftBack 2.8s linear infinite}
    .card-back::after{background:linear-gradient(180deg, rgba(0,0,0,0.05), transparent 75%);opacity:0.08}
    .card-glitch{position:absolute;inset:18px;border-radius:16px;transform:translateZ(18px);pointer-events:none;background:radial-gradient(circle at 40% 30%, rgba(255,255,255,0.24), transparent 22%),repeating-linear-gradient(90deg, rgba(18,48,112,0.12) 0 2px, transparent 2px 8px),repeating-linear-gradient(180deg, rgba(0,0,0,0.04) 0 1px, transparent 1px 12px);mix-blend-mode:screen;opacity:0.85;animation:glitchShiftSoft 4.2s linear infinite}
    .card-text{position:absolute;inset:18px;pointer-events:none;display:flex;align-items:center;justify-content:center;transform:translateZ(22px);z-index:5;opacity:0.28;font-family:ui-monospace,monospace;font-size:10px;line-height:1.2;letter-spacing:1px;color:#15223d;text-align:center;white-space:pre-wrap;overflow:hidden;}
    .card-text::before{content:"境界の白 境界の白 境界の白 境界の白 境界の白\A境界の白 境界の白 境界の白 境界の白 境界の白\A境界の白 境界の白 境界の白 境界の白 境界の白\A境界の白 境界の白 境界の白 境界の白 境界の白";position:absolute;inset:0;color:#112334;opacity:0.22;mix-blend-mode:screen;white-space:pre-wrap;transform:translateZ(0);filter:blur(0.2px);}
    .card-text::after{content:"境界の白 境界の白 境界の白 境界の白 境界の白\A境界の白 境界の白 境界の白 境界の白 境界の白\A境界の白 境界の白 境界の白 境界の白 境界の白\A境界の白 境界の白 境界の白 境界の白 境界の白";position:absolute;inset:0;color:#6d7992;opacity:0.16;mix-blend-mode:screen;white-space:pre-wrap;transform:translateZ(0);animation:glitchText 1.8s infinite alternate;}
    .card-front{position:absolute;inset:12px;border-radius:20px;background:transparent;display:flex;align-items:center;justify-content:center;transform:translateZ(36px);pointer-events:none;padding:10px;}
    .card-img{display:block;width:100%;height:100%;max-height:100%;max-width:100%;border-radius:12px;filter:drop-shadow(0 18px 42px rgba(0,0,0,0.24));transform:translateZ(46px);image-rendering:optimizeQuality;object-fit:contain}
    /* outer glitch overlays for scanlines */
    .card::before,.card::after{content:"";position:absolute;inset:0;pointer-events:none;mix-blend-mode:normal;opacity:0.06}
    .card::before{background-image:linear-gradient(90deg,rgba(10,12,20,0.04) 1px, transparent 1px);background-size:100% 7px;animation:scanline 5.4s linear infinite}
    .card::after{background-image:repeating-linear-gradient(90deg,rgba(20,60,140,0.06) 0 2px, transparent 2px 10px);opacity:0.06;animation:glitchShift 3s linear infinite}
    @keyframes scanline{0%{opacity:0.03;background-position:0 0}50%{opacity:0.07;background-position:0 26px}100%{opacity:0.03;background-position:0 0}}
    @keyframes glitchShift{0%{transform:translateX(0)}20%{transform:translateX(-3px)}40%{transform:translateX(2px)}60%{transform:translateX(-1px)}80%{transform:translateX(1px)}100%{transform:translateX(0)}}
    @keyframes glitchShiftBack{0%{background-position:0 0}25%{background-position:40px 0}50%{background-position:-18px 0}75%{background-position:12px 0}100%{background-position:0 0}}
    @keyframes glitchShiftSoft{0%{transform:translateY(0)}20%{transform:translateY(-2px) translateX(1px)}40%{transform:translateY(1px) translateX(-1px)}60%{transform:translateY(-1px) translateX(2px)}80%{transform:translateY(0) translateX(-1px)}100%{transform:translateY(0) translateX(0)}}
    @media (max-width:520px){.card{left:18px;width:200px;height:300px}.card-img{width:95%;margin:14px auto}}

    .card::before,.card::after{content:"";position:absolute;inset:0;pointer-events:none;mix-blend-mode:normal;opacity:0.06}
    .card::before{background-image:linear-gradient(90deg,rgba(10,12,20,0.04) 1px, transparent 1px);background-size:100% 7px;animation:scanline 5.4s linear infinite}
    .card::after{background-image:repeating-linear-gradient(90deg,rgba(20,60,140,0.05) 0 2px, transparent 2px 10px);opacity:0.06;animation:glitchShift 3s linear infinite}
    @keyframes scanline{0%{opacity:0.03;background-position:0 0}50%{opacity:0.07;background-position:0 26px}100%{opacity:0.03;background-position:0 0}}
    @keyframes glitchShift{0%{transform:translateX(0)}20%{transform:translateX(-3px)}40%{transform:translateX(2px)}60%{transform:translateX(-1px)}80%{transform:translateX(1px)}100%{transform:translateX(0)}}
    @keyframes glitchShiftBack{0%{background-position:0 0}25%{background-position:40px 0}50%{background-position:-18px 0}75%{background-position:12px 0}100%{background-position:0 0}}
    @keyframes glitchShiftSoft{0%{transform:translateY(0)}20%{transform:translateY(-2px) translateX(1px)}40%{transform:translateY(1px) translateX(-1px)}60%{transform:translateY(-1px) translateX(2px)}80%{transform:translateY(0) translateX(-1px)}100%{transform:translateY(0) translateX(0)}}
    @keyframes glitchText{0%{transform:translate(0,0)}20%{transform:translate(-1px,1px)}40%{transform:translate(1px,-1px)}60%{transform:translate(-1px,-1px)}80%{transform:translate(1px,1px)}100%{transform:translate(0,0)}}
    @media (max-width:520px){.card{left:18px;width:180px;height:260px}.card-img{width:95%;margin:14px auto}}
  </style>
</head>
<body>
  <div class="toplink">
    <a href="https://working-ram.github.io/Socials/"><img src="Assets/Ram_Icon.png" alt="Ram"></a>
    <a href="https://working-ram.github.io/Socials/">working-ram.github.io/Socials</a>
  </div>

  <div class="stage">
    <div class="nebula"></div>
    <div class="ring r1"></div>
    <div class="ring r2"></div>
    <div class="core">
      <div class="protons">
        <div class="proton-wrap orbit1"><div class="proton p1" style="transform:translateX(110px)"></div></div>
        <div class="proton-wrap orbit2"><div class="proton p2" style="transform:translateX(80px)"></div></div>
        <div class="proton-wrap orbit3"><div class="proton p3" style="transform:translateX(50px)"></div></div>
        <div class="proton-wrap orbit1" style="animation-duration:18s;"><div class="proton p2" style="transform:translateX(-95px)"></div></div>
        <div class="proton-wrap orbit2" style="animation-duration:11s;"><div class="proton p3" style="transform:translateX(-65px)"></div></div>
      </div>
    </div>
  </div>

  <div class="center"><span class="name">Ram</span></div>
  
  <!-- Floating 3D card with character -->
  <div class="card" id="ramCard" aria-hidden="false">
    <div class="card-inner">
      <div class="card-back"></div>
      <div class="card-glitch"></div>
      <div class="card-text"></div>
      <div class="card-front">
        <img src="Assets/Ram_Art_Transparent.png" alt="Ram" class="card-img">
      </div>
    </div>
  </div>

  <script>
    // 3D floating card that follows the mouse — smooth lerp
    (function(){
      const card = document.getElementById('ramCard');
      if(!card) return;
      const inner = card.querySelector('.card-inner');
      let mouseX = 0, mouseY = 0;
      let tx = 0, ty = 0, trX = 0, trY = 0;
      const ease = 0.12;

      function onMove(e){
        const x = (e.clientX || (e.touches && e.touches[0].clientX)) || 0;
        const y = (e.clientY || (e.touches && e.touches[0].clientY)) || 0;
        const nx = x / window.innerWidth - 0.5;
        const ny = y / window.innerHeight - 0.5;
        mouseX = Math.max(-1, Math.min(1, nx * 2));
        mouseY = Math.max(-1, Math.min(1, ny * 2));
      }

      window.addEventListener('mousemove', onMove, {passive:true});
      window.addEventListener('touchmove', onMove, {passive:true});

      function raf(){
        // target translations and rotations based on card-relative cursor position
        const targetX = mouseX * 22;
        const targetY = mouseY * 18;
        const targetRotY = -mouseX * 34; // invert so card faces cursor direction
        const targetRotX = -mouseY * 28;
        const targetRotZ = mouseX * 2.5;

        tx += (targetX - tx) * ease;
        ty += (targetY - ty) * ease;
        trY += (targetRotY - trY) * ease;
        trX += (targetRotX - trX) * ease;

        // apply transforms: card moves and tilts in 3D
        card.style.transform = `translateY(calc(-50% + ${ty}px)) translateX(${tx}px)`;
        inner.style.transform = `rotateX(${trX}deg) rotateY(${trY}deg) rotateZ(${targetRotZ}deg)`;

        requestAnimationFrame(raf);
      }
      requestAnimationFrame(raf);
    })();
  </script>
</body>
</html>
